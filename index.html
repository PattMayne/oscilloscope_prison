<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Projection</title>
    <link rel="stylesheet" href="./css/app.css?">
</head>

<body>
    <br><br><br>
    <!-- Create a canvas element to draw on -->
    <canvas id="canvas" width="400" height="400"></canvas>


    <div class="controls">
        <input type="file" id="audio_file" accept="audio/*">
        <br>

        <label>BASS COLOR:
            <select id="bass_color">
                <option value="#0095ff">Blue</option>
                <option value="#ff3700">Red</option>
                <option value="#00ff10">Green</option>
                <option value="#ffffff">White</option>
            </select>
        </label>

        <br>
        
        <label>AMPLITUDE COLOR:
            <select id="amp_color">
                <option value="#00ff10">Green</option>
                <option value="#0095ff">Blue</option>
                <option value="#ff3700">Red</option>
                <option value="#ffffff">White</option>
            </select>
        </label>

        <br>
        

        <button id="play_btn" disabled>Play</button>
    </div>
    <script src="./js/uncube.js?version=1492"></script>
</body>

</html>
