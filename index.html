<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Projection</title>
    <link rel="stylesheet" href="./css/app.css?">
</head>

<body style="background-color: black;">
    <br><br><br>
    <!-- Create a canvas element to draw on -->
    <canvas id="canvas" width="400" height="400" style="
        background: transparent;
        background-image: url('./img/coolguy_bg.png');
        margin-left: 250px;
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        width: 25%;
        height: auto;
        display: block;"></canvas>



    <div class="controls">
        <input type="file" id="audio_file" accept="audio/*">
        <button id="play_btn" disabled>Play</button>
    </div>
    <script src="./js/uncube.js?version=149"></script>
</body>

</html>
