<!doctype html>
<html class="no-js" lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Projection</title>
    <link rel="stylesheet" href="./css/foundation.css?ts=5">
    <link rel="stylesheet" href="./css/app.css?">
</head>

<body>
    <div id="page_wrapper">
    <!-- Create a canvas element to draw on -->
    <canvas id="canvas" width="400" height="400"></canvas>


    <div id="controls">
        <div class="grid-x">
            <div class="large-2 medium-5 small-12 cell">
                <div class="audio_controls">
                    <button id="play_btn">Play</button>
                    <button id="stop_btn">Stop</button>
                    <button id="hide_btn">Hide</button>
                </div>
            </div>

            <div class="large-10 medium-7 small-12 cell">
                <div class="input_controls">
                    <div class="input_box">
                        <label>UPLOAD AUDIO:
                            <input type="file" id="audio_file" accept="audio/*">
                        </label>
                    </div>
                    <div class="input_box">
                        <label>UPLOAD IMAGE:
                            <input type="file" id="image_file" accept="image/*">
                        </label>
                    </div>
                    <div class="input_box">
                        <label>INCLUDE FRAME?
                            <input type="checkbox" id="include_frame">
                        </label>
                    </div>
                    <div class="input_box">
                        <label>FRAME COLOR:
                            <select id="frame_color">
                                <option value="#00ff10">Green</option>
                                <option value="#0095ff">Blue</option>
                                <option value="#ff3700">Red</option>
                                <option value="#ffffff" selected>White</option>
                            </select>
                        </label>
                    </div>
                    <div class="input_box">
                        <label>BASS COLOR:
                            <select id="bass_color">
                                <option value="#0095ff" selected>Blue</option>
                                <option value="#ff3700">Red</option>
                                <option value="#00ff10">Green</option>
                                <option value="#ffffff">White</option>
                            </select>
                        </label>

                    </div>
                    <div class="input_box">
                        <label>AMPLITUDE COLOR:
                            <select id="amp_color">
                                <option value="#00ff10">Green</option>
                                <option value="#0095ff">Blue</option>
                                <option value="#ff3700" selected>Red</option>
                                <option value="#ffffff">White</option>
                            </select>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
    <button id="show_controls_btn">Show Controls</button>
    </div>
    <script src="./js/uncube.js?version=2"></script>
    <script src="./js/vendor/jquery.js"></script>
    <script src="./js/vendor/what-input.js"></script>
    <script src="./js/vendor/foundation.js"></script>
</body>

</html>
